name: Build Companion Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'companion-*'

jobs:

  build:
    runs-on: ubuntu-latest
steps:
      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Xiao S3 Firmware
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION || 'custom' }}
        run: |
          # 1. Bouw specifiek de Xiao S3 WIO
          pio run -e Xiao_S3_WIO_companion_radio_ble
          
          # 2. Maak de 'merged' bin (bootloader + app + partitions)
          pio run -t mergebin -e Xiao_S3_WIO_companion_radio_ble
          
          # 3. Maak de 'out' map aan en kopieer de resultaten daarheen
          mkdir -p out
          cp .pio/build/Xiao_S3_WIO_companion_radio_ble/firmware.bin out/xiao_s3_custom.bin
          cp .pio/build/Xiao_S3_WIO_companion_radio_ble/firmware-merged.bin out/xiao_s3_custom-merged.bin

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: companion-firmwares
          path: out
